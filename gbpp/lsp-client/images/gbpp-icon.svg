<?xml version="1.0" encoding="UTF-8"?>
<svg id="godbyte-logo" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
            <style>
                svg {
                    width: 100%;
                    height: auto;
                    filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.5));
                }
                .ribbon {
                    transition: all 0.3s ease;
                }
                .ribbon:hover {
                    filter: brightness(1.2);
                }
                .text-fade {
                    opacity: 0;
                    animation: fadeIn 1.5s ease-out 0.5s forwards;
                }
                @keyframes fadeIn {
                    from { opacity: 0; transform: scale(0.95); }
                    to { opacity: 1; transform: scale(1); }
                }
            </style>
            
            <defs>
                <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#00F2FE"/>
                    <stop offset="100%" stop-color="#4FACFE"/>
                </linearGradient>
                <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#4FACFE"/>
                    <stop offset="100%" stop-color="#667EEA"/>
                </linearGradient>
                <linearGradient id="grad3" x1="100%" y1="100%" x2="0%" y2="0%">
                    <stop offset="0%" stop-color="#667EEA"/>
                    <stop offset="100%" stop-color="#9F7AEA"/>
                </linearGradient>
                <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#ffffff"/>
                    <stop offset="100%" stop-color="#E0F7FA"/>
                </linearGradient>

                <filter id="shadow">
                    <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
                </filter>
            </defs>


            <g transform="translate(0, -5)" filter="url(#shadow)">
                <polygon class="ribbon" points="76.8,150 250,50 423.2,150 371.24,180 250,110 128.76,180" fill="url(#grad1)"/>
            </g>
            <g transform="translate(4.5, 3.5)" filter="url(#shadow)">
                <polygon class="ribbon" points="423.2,150 423.2,350 250,450 250,390 371.24,320 371.24,180" fill="url(#grad2)"/>
            </g>
            <g transform="translate(-4.5, 3.5)" filter="url(#shadow)">
                <polygon class="ribbon" points="250,450 76.8,350 76.8,150 128.76,180 128.76,320 250,390" fill="url(#grad3)"/>
            </g>

            <polygon points="371.24,180 250,110 128.76,180 128.76,320 250,390 371.24,320" fill="#0a0f1c" transform-origin="250 250" transform="scale(0.92)" stroke="#00F2FE" stroke-width="2" stroke-opacity="0.15"/>

            <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="2">
                <line x1="250" y1="250" x2="250" y2="110"/>
                <line x1="250" y1="250" x2="371" y2="180"/>
                <line x1="250" y1="250" x2="371" y2="320"/>
                <line x1="250" y1="250" x2="250" y2="390"/>
                <line x1="250" y1="250" x2="128" y2="320"/>
                <line x1="250" y1="250" x2="128" y2="180"/>
            </g>

            <defs>
                <!-- Gradient for the text -->
                <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#00f0ff"/>
                    <stop offset="50%" stop-color="#ff00ff"/>
                    <stop offset="100%" stop-color="#ff8c00"/>
                </linearGradient>

                <!-- Drop shadow filter -->
                <filter id="textShadow" x="-50%" y="-50%" width="200%" height="200%">
                    <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.4"/>
                </filter>
            </defs>

            <text x="250" y="300" font-family="'JetBrains Mono', monospace" font-size="150" font-weight="900" fill="url(#textGrad)" text-anchor="middle" letter-spacing="8" filter="url(#textShadow)" style="paint-order: stroke fill; stroke: #00000033; stroke-width: 2;">
    GB
</text>
        </svg>